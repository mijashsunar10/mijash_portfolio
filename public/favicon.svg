<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="msGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1fd9a0" />
      <stop offset="100%" stop-color="#7c5cff" />
    </linearGradient>
    <linearGradient id="msGradReverse" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1fd9a0" />
      <stop offset="50%" stop-color="#7c5cff" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="msGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle
    cx="50"
    cy="50"
    r="45"
    stroke="url(#msGradReverse)"
    stroke-width="5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Inner subtle ring -->
  <circle
    cx="50"
    cy="50"
    r="38"
    stroke="url(#msGrad)"
    stroke-width="1.5"
    stroke-dasharray="3 5"
    fill="none"
    opacity="0.4"
  />

  <!-- M letter -->
  <path
    d="M 26 68 L 26 35 L 38 53 L 50 35 L 50 68"
    stroke="url(#msGrad)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#msGlow)"
  />

  <!-- S letter -->
  <path
    d="M 72 38 C 72 32, 58 30, 58 38 C 58 46, 75 44, 75 55 C 75 66, 56 66, 56 58"
    stroke="url(#msGradReverse)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#msGlow)"
  />

  <!-- Accent dot -->
  <circle
    cx="50"
    cy="80"
    r="4"
    fill="#1fd9a0"
  />
</svg>